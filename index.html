<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino sticker</title>
    <style>
        body {
            background-color: #2c3e50;
            background-image: url('https://www.transparenttextures.com/patterns/chalkboard.png');
            color: white; font-family: 'Arial', sans-serif;
            display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px;
        }
        h1 { border-bottom: 2px solid white; padding-bottom: 10px; }
        
        /* 左上角：管理按鈕 */
        .left-controls {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 3000;
        }
        
        /* 右上角：功能按鈕 (占卜與 AI) */
        .right-controls {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 3000;
            display: flex;
            flex-direction: column; /* 上下排列 */
            gap: 10px;
            align-items: flex-end;
        }
        
        /* 按鈕美化：毛玻璃質感 */
        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        
        .ai-btn { border-color: #2ecc71 !important; color: #2ecc71 !important; }
        .oracle-btn { border-color: #f1c40f !important; color: #f1c40f !important; }
        
        /* 占卜氣泡：也要移到右邊以免擋到 */
        #fortune-bubble {
            background: white; color: #333; padding: 12px; border-radius: 12px;
            width: 180px; font-size: 0.9rem; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            display: none; border: 2px solid #2ecc71;
            position: absolute; top: 100px; right: 0; /* 出現在按鈕下方 */
        }
        
        /* 手機版適應 */
        @media (max-width: 600px) {
            .control-btn { padding: 6px 10px; font-size: 12px; }
            .right-controls { top: 10px; right: 10px; }
            .left-controls { top: 10px; left: 10px; }
        }
        
        /* --- 手機版優化 (響應式) --- */
        @media (max-width: 600px) {
            .controls {
                top: 10px;
                left: 10px;
                flex-direction: row; /* 手機版改為橫向排列，節省高度 */
                flex-wrap: wrap; /* 空間不夠時自動換行 */
                max-width: 90vw;
            }
            
            .control-btn {
                padding: 8px 12px;
                font-size: 12px;
                border-radius: 8px;
            }
            
            /* 在極小螢幕隱藏文字，只留圖示 (選用) */
            .control-btn span {
                display: none;
            }
        }
        .ai-btn { background: rgba(46, 204, 113, 0.6) !important; border: 1px solid #2ecc71 !important; }
        .oracle-btn { background: rgba(241, 196, 15, 0.6) !important; border: 1px solid #f1c40f !important; }

        /* 占卜氣泡 */
        #fortune-bubble {
            background: white; color: #333; padding: 15px; border-radius: 12px; margin-top: 10px;
            width: 200px; max-width: 75vw; font-size: 1rem; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            display: none; line-height: 1.5; border: 2px solid #2ecc71;
        }

        .countdown-container {
            background: rgba(0, 0, 0, 0.3); padding: 10px 20px; border-radius: 50px;
            margin: 10px 0 20px 0; border: 1px dashed #fff; font-size: 1rem; color: #ffeb3b; text-align: center;
        }

        .input-area { background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 10px; margin-bottom: 30px; text-align: center; }
        textarea { width: 300px; height: 80px; padding: 10px; border-radius: 5px; border: none; display: block; margin-bottom: 10px; }
        
        #sticker-wall { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .sticker { background-color: #fff9c4; color: #333; padding: 20px; min-height: 150px; box-shadow: 5px 5px 10px rgba(0,0,0,0.3); transform: rotate(-1deg); display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .delete-btn { position: absolute; top: -10px; right: -10px; background: #e74c3c; color: white; border-radius: 50%; width: 25px; height: 25px; border: none; display: none; cursor: pointer; }
        .admin-mode .delete-btn { display: block; }

        /* AI 半透明對話框 */
        #ai-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 5000;
        }
        .ai-modal {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; height: 70vh;
            color: white; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); position: relative;
            display: flex; flex-direction: column;
        }
        .ai-chat-box { flex-grow: 1; overflow-y: auto; margin-bottom: 15px; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .ai-input-area { display: flex; gap: 8px; }
        .ai-input { flex-grow: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; color: white; padding: 8px; }
        .ai-close-btn { position: absolute; top: 10px; right: 15px; font-size: 28px; cursor: pointer; color: white; background: none; border: none; }
    </style>
</head>

        function toggleAI() {
            const overlay = document.getElementById('ai-overlay');
            const chatBox = document.getElementById('ai-chat-box');
            const isVisible = overlay.style.display === 'flex';
            
            overlay.style.display = isVisible ? 'none' : 'flex';
            
            if (!isVisible) {
                // 開啟時，先檢查有沒有 Key
                if (!SYSTEM_AI_KEY) {
                    chatBox.innerHTML = '<div style="color:#ff7675;">等等... 我還沒拿到鑰匙 (Firebase 載入中)，請稍後再開。</div>';
                } else {
                    chatBox.innerHTML = '<div style="color:#ff7675;">對話將不被保留，重要資訊請另存，你想說什麼？</div>';
                }
            } else {
                chatBox.innerHTML = ""; 
            }
        }

        async function sendToAI() {
            const sendBtn = document.querySelector('ai-send-btn');
            const input = document.getElementById('ai-user-input');
            const chatBox = document.getElementById('ai-chat-box');
            const text = input.value.trim();

            if (sendBtn.disabled) return;
            sendBtn.disabled = true;
            sendBtn.innerText = "講太快了啦";
            // 檢查 Key 是否真的有從 Firebase 抓到
            if (!text || !SYSTEM_AI_KEY) {
                if (!SYSTEM_AI_KEY) alert("鑰匙尚未就緒（Firebase 未載入）！");
                return;
            }
        
            // 1. 顯示你的訊息（修正引號）
            chatBox.innerHTML += `<div class="ai-msg"><b>你：</b>${text}</div>`;
            input.value = ""; 
            chatBox.scrollTop = chatBox.scrollHeight;
        
            // 2. 建立思考中節點
            const loadingId = "loading-" + Date.now();
            chatBox.innerHTML += `<div id="${loadingId}" class="ai-msg" style="color:#2ecc71;"><b>Dino：</b>正在思考中...🦖</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        
            try {
                // 修正 URL 與 Body 的語法
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash-lite-001:generateContent?key=${SYSTEM_AI_KEY.trim()}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ 
                                text: `你是Dino，一個網站上的AI助理，你的工作是陪伴所有與你對話的人，一旦他們與你結束對話關閉視窗，你將失去所有與他們之間的紀錄。請用簡短、幽默的方式回覆。回覆時請使用繁體中文，並且不要提到自己的人設。對話中禁止色情或是會引起爭議的話題。若對方撩你，你也可以選擇撩回去。使用者說：${text}` 
                            }] 
                        }]
                    })
                });
        
                const data = await response.json();
                
                // 檢查 API 是否回傳錯誤
                if (data.error) throw new Error(data.error.message);
        
                const aiReply = data.candidates[0].content.parts[0].text;
                // --- 核心修正：將對話推送到 Firebase ---
                database.ref('ai_logs').push({
                    user_msg: text,                    // 使用者問了什麼
                    dino_msg: aiReply,                 // Dino 回了什麼
                    timestamp: new Date().toLocaleString('zh-TW'), // 說話的時間
                    userAgent: navigator.userAgent     // (選填) 紀錄對方是用什麼設備/瀏覽器，方便抓亂搞的人
                });
                document.getElementById(loadingId).innerHTML = `<b>Dino：</b>${aiReply}`;
                let timer = 8;
                const interval = setInterval(() => {
                    timer--;
                    sendBtn.innerText = '等 ${timer}s';
                    if (timer <= 0) {
                        clearInterval(interval);
                        sendBtn.disabled = false;
                        sendBtn.innerText = "傳送";
                    }
                }, 1000);
                
            } catch (e) {
                console.error(e);
                setTimeout(() => {
                    sendBtn.disabled = false;
                    sendBtn.innerText = "重試";
                }, 5000)
                // 錯誤發生時，顯示具體原因
                document.getElementById(loadingId).innerHTML = `<span style="color:#ff7675;"><b>Dino：</b>嘖，出事了：${e.message}</span>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- 核心功能 (倒數計時、發布、刪除、管理) ---
        const targets = [
            { name: "兒童節補假", date: "2026-04-03T00:00:00" },
            { name: "清明節補假", date: "2026-04-06T00:00:00" },
            { name: "期中考週", date: "2026-04-20T00:00:00" },
            { name: "勞動節放假", date: "2026-05-01T00:00:00" },
            { name: "端午節放假", date: "2026-06-19T00:00:00" },
            { name: "期末考週", date: "2026-06-22T00:00:00" },
        ];
        function updateCountdown() {
            const now = new Date().getTime();
            const next = targets.find(t => new Date(t.date).getTime() > now);
            if (next) {
                const diff = new Date(next.date).getTime() - now;
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer-text').innerText = `離${next.name}還有：${d}天${h}時${m}分${s}秒`;
            }
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        function postSticker() {
            const text = document.getElementById('noteText').value;
            if (!text.trim()) return alert("不能為空");
            database.ref('stickers').push({
                content: text, date: new Date().toLocaleString('zh-TW'),
                color: colors[Math.floor(Math.random() * colors.length)]
            });
            document.getElementById('noteText').value = "";
        }

        function deleteSticker(id) {
            if (isAdmin && confirm("確定要刪除這條紀錄嗎？")) {
                database.ref('stickers/' + id).remove()
                    .then(() => { console.log("刪除成功"); })
                    .catch((error) => { alert("刪除失敗：" + error.message); });
            } else if (!isAdmin) {
                alert("請先解鎖管理模式！");
            }
        }

            }

                    const div = document.createElement('div');
                    div.className = 'sticker';
                    
                    // 💡 重新接回正確的判斷邏輯
                    const isManager = item.content.startsWith('!');
                    const cleanContent = isManager ? item.content.substring(1) : item.content;
                    
                    if (isManager) {
                        // --- 管理者公告樣式 (深藍色) ---
                        div.style.backgroundColor = '#2c3e50'; 
                        div.style.color = '#ecf0f1';           
                        div.style.border = '2px solid #f1c40f'; // 金色外框
                        div.style.boxShadow = '0 0 10px rgba(241, 196, 15, 0.5)';
                        div.style.fontWeight = 'bold';
                    } else {
                        // --- 普通同學樣式 ---
                        div.style.backgroundColor = item.color || '#fff9c4';
                        div.style.color = '#333';
                        div.style.border = 'none';
                    }
        
                    div.innerHTML = `
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteSticker('${id}')">×</button>
                        ${isManager ? '<span style="font-size:0.7rem; color:#f1c40f; display:block; margin-bottom:5px;">📌 管理者公告</span>' : ''}
                        <div class="content">${cleanContent}</div>
                        <div class="date">${item.date}</div>
                    `;
                    wall.appendChild(div);
                });
            }
        });
    </script>

    <div id="ai-overlay">
        <div class="ai-modal">
            <button class="ai-close-btn" onclick="toggleAI()">×</button>
            <h3 style="margin-top:0;">Dino AI模式</h3>
            <div id="ai-chat-box" class="ai-chat-box"></div>
            <div class="ai-input-area">
                <input type="text" id="ai-user-input" class="ai-input" placeholder="你請說..." onkeypress="if(event.key==='Enter') sendToAI()">
                <button onclick="sendToAI()">傳送</button>
            </div>
        </div>
    </div>
</body>
</html>

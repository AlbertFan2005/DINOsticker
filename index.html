<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino sticker</title>
    <style>
        body {
            background-color: #2c3e50;
            background-image: url('https://www.transparenttextures.com/patterns/chalkboard.png');
            color: white; font-family: 'Arial', sans-serif;
            display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px;
        }
        h1 { border-bottom: 2px solid white; padding-bottom: 10px; }
        
        /* 左上角控制面板 */
        .controls { position: fixed; top: 20px; left: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 10px; }
        .control-btn { background: rgba(0,0,0,0.5); border: 1px solid #fff; color: white; padding: 8px 12px; border-radius: 5px; font-size: 14px; cursor: pointer; text-align: center; font-weight: bold; }
        .ai-btn { background: rgba(46, 204, 113, 0.6) !important; border: 1px solid #2ecc71 !important; }
        .oracle-btn { background: rgba(241, 196, 15, 0.6) !important; border: 1px solid #f1c40f !important; }

        /* 占卜氣泡 */
        #fortune-bubble {
            background: white; color: #333; padding: 15px; border-radius: 12px; margin-top: 10px;
            width: 200px; max-width: 75vw; font-size: 1rem; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            display: none; line-height: 1.5; border: 2px solid #2ecc71;
        }

        .countdown-container {
            background: rgba(0, 0, 0, 0.3); padding: 10px 20px; border-radius: 50px;
            margin: 10px 0 20px 0; border: 1px dashed #fff; font-size: 1rem; color: #ffeb3b; text-align: center;
        }

        .input-area { background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 10px; margin-bottom: 30px; text-align: center; }
        textarea { width: 300px; height: 80px; padding: 10px; border-radius: 5px; border: none; display: block; margin-bottom: 10px; }
        
        #sticker-wall { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .sticker { background-color: #fff9c4; color: #333; padding: 20px; min-height: 150px; box-shadow: 5px 5px 10px rgba(0,0,0,0.3); transform: rotate(-1deg); display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .delete-btn { position: absolute; top: -10px; right: -10px; background: #e74c3c; color: white; border-radius: 50%; width: 25px; height: 25px; border: none; display: none; cursor: pointer; }
        .admin-mode .delete-btn { display: block; }

        /* AI 半透明對話框 */
        #ai-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 5000;
        }
        .ai-modal {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; height: 70vh;
            color: white; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); position: relative;
            display: flex; flex-direction: column;
        }
        .ai-chat-box { flex-grow: 1; overflow-y: auto; margin-bottom: 15px; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .ai-input-area { display: flex; gap: 8px; }
        .ai-input { flex-grow: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; color: white; padding: 8px; }
        .ai-close-btn { position: absolute; top: 10px; right: 15px; font-size: 28px; cursor: pointer; color: white; background: none; border: none; }
    </style>
</head>
<body>
    <div class="controls">
        <button id="admin-btn" class="control-btn" onclick="checkAdmin()">🔒 管理</button>
        <button class="control-btn oracle-btn" onclick="dinoFortune()">🔮 Dino占卜</button>
        <button class="control-btn ai-btn" onclick="toggleAI()">Dino AI</button>
        <div id="fortune-bubble"></div>
    </div>

    <h1>Dino sticker</h1>
    <div class="countdown-container">⏳ <span id="timer-text">計算中...</span></div>
    
    <div class="input-area">
        <textarea id="noteText" placeholder="跟Dino說話><"></textarea>
        <button onclick="postSticker()" style="background:#f1c40f;">發布</button>
    </div>

    <div id="sticker-wall"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>

            apiKey: "AIzaSyBiR6cspX-7kF7_OXsAX672kuOf-SnQB-0",

            databaseURL: "https://dinosticker-c93c6-default-rtdb.firebaseio.com/",
            projectId: "dinosticker-c93c6",
            storageBucket: "dinosticker-c93c6.firebasestorage.app",
            messagingSenderId: "959711028780",
            appId: "1:959711028780:web:899b320dcd1cda03b21389"

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const colors = ['#fff9c4', '#ffcdd2', '#f8bbd0', '#e1f5fe', '#d1c4e9', '#c8e6c9', '#ffe0b2'];

        // --- AI 邏輯 ---
        let SYSTEM_AI_KEY = "";
        database.ref('aiConfig/key').on('value', (snapshot) => { SYSTEM_AI_KEY = snapshot.val(); });

        function toggleAI() {
            const overlay = document.getElementById('ai-overlay');
            if (overlay.style.display === 'flex') {
                overlay.style.display = 'none';
                document.getElementById('ai-chat-box').innerHTML = ""; 
            } else {
                overlay.style.display = 'flex';
                document.getElementById('ai-chat-box').innerHTML = '<div style="color:#2ecc71;">🦖 Dino：嘿！跟我聊天不會留紀錄，關掉就沒囉！想問什麼？</div>';
            }
        }

        async function sendToAI() {
            const input = document.getElementById('ai-user-input');
            const chatBox = document.getElementById('ai-chat-box');
            const text = input.value.trim();
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${SYSTEM_AI_KEY}`;
        
            // 檢查是否有抓到 Key 和文字
            if (!text) return;
            if (!SYSTEM_AI_KEY) {
                alert("AI 鑰匙還沒準備好，請稍候或是檢查 Firebase 設定！");
                return;
            }
        
            // 1. 立即顯示使用者的話
            chatBox.innerHTML += `<div class="ai-msg"><b>你：</b>${text}</div>`;
            input.value = ""; // 清空
            chatBox.scrollTop = chatBox.scrollHeight;
        
            // 2. 顯示思考中
            const loadingId = "loading-" + Date.now();
            chatBox.innerHTML += `<div id="${loadingId}" class="ai-msg" style="color:#2ecc71;"><b>Dino：</b>正在思考中...🦖</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${SYSTEM_AI_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `你是 Dino，Albert 的高冷分身。請用簡短、幽默、且帶點傲嬌高冷的方式回覆。使用者說：'${text}'` }] }]
                    })
                });
        
                const data = await response.json();
                const aiReply = data.candidates[0].content.parts[0].text;
        
                // 3. 替換掉思考中的文字
                document.getElementById(loadingId).innerHTML = `<b>Dino：</b>${aiReply}`;
                chatBox.scrollTop = chatBox.scrollHeight;
        
            } catch (e) {
                console.error("AI 錯誤:", e);
                document.getElementById(loadingId).innerHTML = `<span style="color:red;"><b>Dino：</b>嘖，斷網了。</span>`;
            }
        }

                            "立即回覆。","暫時沉默。","大膽嘗試。","謹慎行事。","有好轉。","情況惡化。","靜觀其變。","主動改變。","保持現狀。","尋求專業意見。","相信自己。",
                            "事情簡單化。","別把它複雜化。","會有延誤。","提前完成。","不要賭。","可以小賭。","需要道歉。","對方會道歉。","保持耐性。","該放手了。",

                            "別投入太多。","一切順利。","需要重來。","可以補救。","無法挽回。","有意外收穫。","不要依附。","建立界線。","試著聯絡。","等對方。",
                            "你會改變想法。","想法不變。","會遇到貴人。","需要自救。","低調處理。","高調宣示。","這是轉捩點。","還沒到關鍵。","別被影響。","聽聽建議。",

                            "好戲在後。","事情已定。","還可逆轉。","你會理解。","現在不明白。","之後會明朗。","先處理情緒。","理性優先。","感性優先。","這是警訊。",
                            "這是祝福。","不必比較。","你走在對的路上。","停下來想想。","再給一次機會。","這是最後一次。","事情不如表面。","表面就是全部。","先試小規模。",
                            "全面推進。","等待回報。","主動爭取。","不必強求。","有人觀察你。","沒人注意。","適合公開。","適合私下。","會有延續。","就到此為止。",
                            "試著理解。","不需要理解。","再給時間。","時間不多。","會出現轉機。","轉機已過。","保持期待。","放低期待。","可以放心。","別放心太早。",
                            "這是好兆頭。","重新出發。","一切皆有可能。" ];

            const bubble = document.getElementById('fortune-bubble');
            bubble.style.display = 'block'; bubble.innerHTML = "🔮 <strong>讓我想想...</strong>";
            setTimeout(() => {
                bubble.innerHTML = "<strong>🦖 Dino：</strong><br>" + fortunes[Math.floor(Math.random() * fortunes.length)];
                setTimeout(() => bubble.style.display = 'none', 3000);
            }, 1000);
        }

        // --- 核心功能 (倒數計時、發布、刪除、管理) ---
        const targets = [
            { name: "兒童節補假", date: "2026-04-03T00:00:00" },
            { name: "清明節補假", date: "2026-04-06T00:00:00" },
            { name: "期中考週", date: "2026-04-20T00:00:00" },
            { name: "勞動節放假", date: "2026-05-01T00:00:00" },
            { name: "端午節放假", date: "2026-06-19T00:00:00" },
            { name: "期末考週", date: "2026-06-22T00:00:00" },
        ];
        function updateCountdown() {
            const now = new Date().getTime();
            const next = targets.find(t => new Date(t.date).getTime() > now);
            if (next) {
                const diff = new Date(next.date).getTime() - now;
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer-text').innerText = `離 ${next.name} 還有：${d}天 ${h}時 ${m}分 ${s}秒`;
            }
        }
        setInterval(updateCountdown, 1000);

        function postSticker() {
            const text = document.getElementById('noteText').value;
            if (!text.trim()) return alert("不能為空");
            database.ref('stickers').push({
                content: text, date: new Date().toLocaleString('zh-TW'),
                color: colors[Math.floor(Math.random() * colors.length)]
            });
            document.getElementById('noteText').value = "";
        }

        let isAdmin = false;
        function checkAdmin() {
            if (prompt("密碼") === "asas1212") {
                isAdmin = true;
                document.body.classList.add('admin-mode');
                alert("已啟動管理模式");
            }
        }

        database.ref('stickers').on('value', (snapshot) => {
            const wall = document.getElementById('sticker-wall');
            wall.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    const item = data[id];
                    const div = document.createElement('div');
                    div.className = 'sticker';
                    
                    // 💡 重新接回正確的判斷邏輯
                    const isManager = item.content.startsWith('!');
                    const cleanContent = isManager ? item.content.substring(1) : item.content;
                    
                    if (isManager) {
                        // --- 管理者公告樣式 (深藍色) ---
                        div.style.backgroundColor = '#2c3e50'; 
                        div.style.color = '#ecf0f1';           
                        div.style.border = '2px solid #f1c40f'; // 金色外框
                        div.style.boxShadow = '0 0 10px rgba(241, 196, 15, 0.5)';
                        div.style.fontWeight = 'bold';
                    } else {
                        // --- 普通同學樣式 ---
                        div.style.backgroundColor = item.color || '#fff9c4';
                        div.style.color = '#333';
                        div.style.border = 'none';
                    }
        
                    div.innerHTML = `
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteSticker('${id}')">×</button>
                        ${isManager ? '<span style="font-size:0.7rem; color:#f1c40f; display:block; margin-bottom:5px;">📌 管理者公告</span>' : ''}
                        <div class="content">${cleanContent}</div>
                        <div class="date">${item.date}</div>
                    `;
                    wall.appendChild(div);
                });
            }
        });
    </script>

    <div id="ai-overlay">
        <div class="ai-modal">
            <button class="ai-close-btn" onclick="toggleAI()">×</button>
            <h3 style="margin-top:0;">Dino AI模式</h3>
            <div id="ai-chat-box" class="ai-chat-box"></div>
            <div class="ai-input-area">
                <input type="text" id="ai-user-input" class="ai-input" placeholder="你請說..." onkeypress="if(event.key==='Enter') sendToAI()">
                <button onclick="sendToAI()">傳送</button>
            </div>
        </div>
    </div>
</body>
</html>
